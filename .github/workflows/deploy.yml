name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build config.js from secrets
        run: |
          echo "const STORE_CONFIG = {" > config.js
          echo "  PAYFAST_MERCHANT_ID:       '${{ secrets.PAYFAST_MERCHANT_ID }}'," >> config.js
          echo "  PAYFAST_MERCHANT_KEY:      '${{ secrets.PAYFAST_MERCHANT_KEY }}'," >> config.js
          echo "  PAYFAST_PASSPHRASE:        '${{ secrets.PAYFAST_PASSPHRASE }}'," >> config.js
          echo "  EMAILJS_PUBLIC_KEY:        '${{ secrets.EMAILJS_PUBLIC_KEY }}'," >> config.js
          echo "  EMAILJS_SERVICE_ID:        '${{ secrets.EMAILJS_SERVICE_ID }}'," >> config.js
          echo "  EMAILJS_OWNER_TEMPLATE:    '${{ secrets.EMAILJS_OWNER_TEMPLATE }}'," >> config.js
          echo "  EMAILJS_CUSTOMER_TEMPLATE: '${{ secrets.EMAILJS_CUSTOMER_TEMPLATE }}'," >> config.js
          echo "  STORE_OWNER_EMAIL:         '${{ secrets.STORE_OWNER_EMAIL }}'," >> config.js
          echo "  DELIVERY_FEE:              60," >> config.js
          echo "  PAYFAST_URL:               'https://www.payfast.co.za/eng/process'," >> config.js
          echo "};" >> config.js
          echo "config.js contents:"
          cat config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
